version: '3.8'

services:
  cassandra:
    image: cassandra:latest
    container_name: chess_cassandra
    ports:
      - "9042:9042" # Native transport
      - "7199:7199" # JMX
    environment:
      - CASSANDRA_CLUSTER_NAME=ChessCluster
    volumes:
      - F:\cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "[ $$(nodetool statusgossip) = running ]"]
      interval: 30s
      timeout: 10s
      retries: 5
